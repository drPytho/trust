# Create this Secret before applying the ClusterIssuer:
#
#   kubectl -n cert-manager create secret tls trust-client-ca \
#     --cert=/path/to/client-ca.crt \
#     --key=/path/to/client-ca.key
#
# ClusterIssuer CA Secrets are read from cert-manager's cluster resource
# namespace, which is normally `cert-manager`.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: trust-client-ca
spec:
  ca:
    secretName: trust-client-ca
