apiVersion: v1
kind: ServiceAccount
metadata:
  name: trust
  namespace: trust-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trust-config
  namespace: trust-system
data:
  config.toml: |
    # Plain reverse proxy intentionally disabled in this production-oriented example.
    [listen]

    [tls]
    addr = "0.0.0.0:6443"
    cert_path = "/etc/trust/tls/server.crt"
    key_path = "/etc/trust/tls/server.key"

    [forward_proxy]
    addr = "0.0.0.0:6180"
    # This example confines the plaintext listener with NetworkPolicy.
    tls = false
    connect_timeout = "10s"
    idle_timeout = "5m"
    max_tunnel_duration = "1h"
    max_concurrent_tunnels = 1024
    allow_private_ips = false
    # Audit fallback. Grant the dedicated scope to each sandbox identity that
    # should reach otherwise-unmatched public HTTP(S) destinations.
    # audit_unmatched = { scope = "outbound-audit" }

    # This signer is a dedicated online egress intermediate. It is unrelated
    # to the reverse-proxy server certificate, issuance client CA, and JWT key.
    [forward_proxy.mitm]
    issuer_cert_chain_path = "/etc/trust/egress-mitm/intermediate-chain.pem"
    issuer_key_path = "/etc/trust/egress-mitm/intermediate.key"
    leaf_ttl = "24h"
    refresh_before = "1h"
    leaf_cache_capacity = 256
    handshake_timeout = "10s"

    [auth]
    issuer = "https://trust.example.com/"
    audience = "trust-proxy"

    [auth.signing]
    algorithm = "ES256"
    token_ttl = "1h"
    key_secret_ref = "projects/PROJECT_ID/secrets/trust-signing-key/versions/latest"

    [issuance]
    mtls_addr = "0.0.0.0:8443"
    client_ca_path = "/etc/trust/tls/client-ca.pem"
    jwks_addr = "0.0.0.0:8080"

    [[issuance.clients]]
    spiffe = "spiffe://example/workloads/*"
    allowed_scopes = ["anthropic", "linear", "github:ORG/REPOSITORY", "github-git:ORG/REPOSITORY", "public-api", "gcp-pubsub", "gcp-storage"]

    [github_app]
    app_id = 123456
    private_key_secret_ref = "projects/PROJECT_ID/secrets/github-app-key/versions/latest"

    [[github_app.installations]]
    owner = "ORG"
    installation_id = 111111

    [[upstreams]]
    name = "anthropic"
    kind = "api"
    listen_host = "anthropic.proxy.internal"
    origin = "https://api.anthropic.com"
    secret_ref = "projects/PROJECT_ID/secrets/anthropic-key/versions/latest"
    injection = { header = "x-api-key", scheme = "raw" }
    # Opt-in standard HTTPS proxy path. A sandbox must trust the dedicated
    # egress root and mint the named `anthropic` scope; outbound-audit alone
    # can never enter this credential-injection path.
    intercept_connect = true

    # Linear's GraphQL API accepts personal API keys as a raw Authorization
    # value. Store the key in Secret Manager; workloads supply only a trust JWT.
    [[upstreams]]
    name = "linear"
    kind = "api"
    listen_host = "linear.proxy.internal"
    origin = "https://api.linear.app"
    secret_ref = "projects/PROJECT_ID/secrets/linear-key/versions/latest"
    injection = { header = "authorization", scheme = "raw" }
    allowed_methods = ["POST"]

    # Reverse-proxy-only GitHub CLI API. gh supplies the trust JWT as its
    # enterprise token; trust injects an exact-repository installation token.
    [[upstreams]]
    name = "github"
    kind = "api"
    listen_host = "github.proxy.internal"
    origin = "https://api.github.com"
    credential = { kind = "github-app", permissions = { contents = "read", pull_requests = "read", issues = "read" } }
    injection = { header = "authorization", scheme = "bearer" }
    resource = { kind = "github-cli-repo" }

    # git subprocesses spawned by gh are rewritten to this cache endpoint.
    [[upstreams]]
    name = "github-git"
    kind = "git-cache"
    listen_host = "git.proxy.internal"
    origin = "https://github.com"
    credential = { kind = "github-app", permissions = { contents = "read" }, basic_username = "x-access-token" }
    injection = { header = "authorization", scheme = "basic" }
    resource = { kind = "git-repo" }
    git = { storage_path = "/var/lib/trust/mirrors" }

    [[upstreams]]
    name = "public-api"
    kind = "api"
    mode = "passthrough"
    listen_host = "public.proxy.internal"
    origin = "https://api.example.com"
    allow_connect = true

    # Workload Identity obtains the Google access token in the sandbox. These
    # CONNECT upstreams only authorize the destination; Google IAM remains the
    # bucket/topic-level authorization layer.
    [[upstreams]]
    name = "gcp-pubsub"
    kind = "api"
    mode = "passthrough"
    listen_host = "pubsub.proxy.internal"
    origin = "https://pubsub.googleapis.com"
    allow_connect = true

    [[upstreams]]
    name = "gcp-storage"
    kind = "api"
    mode = "passthrough"
    listen_host = "storage.proxy.internal"
    origin = "https://storage.googleapis.com"
    allow_connect = true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trust
  namespace: trust-system
  labels:
    app.kubernetes.io/name: trust
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trust
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trust
    spec:
      serviceAccountName: trust
      containers:
        - name: trust
          image: ghcr.io/drpytho/trust:latest
          imagePullPolicy: Always
          env:
            - name: TRUST_CONFIG
              value: /etc/trust/config.toml
            - name: RUST_LOG
              value: info
          ports:
            - name: proxy-tls
              containerPort: 6443
            - name: forward-proxy
              containerPort: 6180
            - name: token-mtls
              containerPort: 8443
            - name: management
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: management
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: management
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/trust/config.toml
              subPath: config.toml
              readOnly: true
            - name: tls
              mountPath: /etc/trust/tls
              readOnly: true
            - name: egress-mitm-intermediate
              mountPath: /etc/trust/egress-mitm
              readOnly: true
            - name: git-mirrors
              mountPath: /var/lib/trust/mirrors
      volumes:
        - name: config
          configMap:
            name: trust-config
        - name: tls
          secret:
            secretName: trust-tls
        # Contains only intermediate-chain.pem and intermediate.key. Never
        # place the offline root key in this Secret or any running Pod.
        - name: egress-mitm-intermediate
          secret:
            secretName: trust-egress-mitm-intermediate
        - name: git-mirrors
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: trust
  namespace: trust-system
spec:
  selector:
    app.kubernetes.io/name: trust
  ports:
    - name: proxy-tls
      port: 6443
      targetPort: proxy-tls
    - name: forward-proxy
      port: 6180
      targetPort: forward-proxy
    - name: token-mtls
      port: 8443
      targetPort: token-mtls
    - name: management
      port: 8080
      targetPort: management
