# This policy isolates ingress to trust Pods. Token clients may reach the mTLS
# issuance endpoint, and proxy clients may reach the reverse and CONNECT proxies.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trust-token-clients
  namespace: trust-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: trust
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: workloads
          podSelector:
            matchLabels:
              trust.example.com/token-client: "true"
      ports:
        - protocol: TCP
          port: 8443
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: workloads
          podSelector:
            matchLabels:
              trust.example.com/proxy-client: "true"
      ports:
        - protocol: TCP
          port: 6180
        - protocol: TCP
          port: 6443
