apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-service
  namespace: workloads
automountServiceAccountToken: false
---
# Replace this placeholder with the CA certificate that signed trust's server
# certificate. This is public trust material, not the client CA private key.
apiVersion: v1
kind: ConfigMap
metadata:
  name: trust-server-ca
  namespace: workloads
data:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_TRUST_SERVER_CA_CERTIFICATE
    -----END CERTIFICATE-----
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-service
  namespace: workloads
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: my-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: my-service
        trust.example.com/token-client: "true"
        trust.example.com/proxy-client: "true"
        trust.example.com/restricted-egress: "true"
    spec:
      serviceAccountName: my-service
      automountServiceAccountToken: false
      containers:
        - name: my-service
          # Replace this with the real workload image. The application should
          # mint and refresh its trust JWT in memory.
          image: example.invalid/my-service:replace-me
          env:
            - name: TRUST_TOKEN_URL
              value: https://trust.trust-system.svc:8443/token
            - name: TRUST_CLIENT_CERT
              value: /var/run/trust/client/tls.crt
            - name: TRUST_CLIENT_KEY
              value: /var/run/trust/client/tls.key
            - name: TRUST_SERVER_CA
              value: /var/run/trust/server/ca.crt
            # Application-specific proxy address. The NetworkPolicy permits
            # this plaintext in-cluster listener but no direct public egress.
            # After minting a short-lived JWT, the application sends
            # Proxy-Authorization: Bearer <JWT> (or Basic jwt:<JWT>) here.
            - name: TRUST_FORWARD_PROXY
              value: http://trust.trust-system.svc:6180
            - name: NO_PROXY
              value: >-
                metadata.google.internal,
                169.254.169.254,
                169.254.169.252,
                trust.trust-system.svc,
                .proxy.internal
          volumeMounts:
            - name: trust-client
              mountPath: /var/run/trust/client
              readOnly: true
            - name: trust-server-ca
              mountPath: /var/run/trust/server
              readOnly: true
      volumes:
        - name: trust-client
          secret:
            secretName: my-service-trust-client
        - name: trust-server-ca
          configMap:
            name: trust-server-ca
