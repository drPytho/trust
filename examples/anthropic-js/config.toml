# Example trust config for the anthropic-js demo.
# Paths are relative to trust's working directory — run trust from the repo root
# (where you generated `certs/` via scripts/dev-certs.sh), or make them absolute.
# No plaintext secrets here: the signing key and the Anthropic API key both live
# in GCP Secret Manager (see the README).

[listen]
tcp = "0.0.0.0:6191"        # the JS client points here (http://localhost:6191)

[tls]                        # required; the issuance server reuses this cert/key
addr = "0.0.0.0:6443"
cert_path = "certs/server.crt"
key_path  = "certs/server.key"

[auth]
issuer   = "https://trust.local/"
audience = "trust-proxy"

[auth.signing]
algorithm = "ES256"
token_ttl = "7d"
key_secret_ref = "projects/YOUR_PROJECT/secrets/trust-signing-key/versions/latest"

[issuance]
mtls_addr      = "0.0.0.0:8443"
client_ca_path = "certs/client-ca.crt"
jwks_addr      = "0.0.0.0:8080"

# The dev client cert's SPIFFE id (from scripts/dev-certs.sh) → may mint `anthropic`.
[[issuance.clients]]
spiffe         = "spiffe://example/dev/local"
allowed_scopes = ["anthropic"]

[[upstreams]]
name = "anthropic"
kind = "api"
listen_host = "localhost"    # the SDK sends Host: localhost → routes here
origin = "https://api.anthropic.com"
secret_ref = "projects/YOUR_PROJECT/secrets/anthropic-key/versions/latest"
injection = { header = "x-api-key", scheme = "raw" }   # Anthropic uses x-api-key
